name: Build NuGet

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  pack:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/LightDl/LightDl.csproj

      - name: Build
        run: dotnet build src/LightDl/LightDl.csproj --configuration Release --no-restore

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            $version = "0.1.0-ci.$env:GITHUB_RUN_NUMBER"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Pack
        run: dotnet pack src/LightDl/LightDl.csproj --configuration Release --no-build --output artifacts /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg

      - name: Upload package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nupkg

      - name: NuGet login
        if: startsWith(github.ref, 'refs/tags/v')
        id: login
        uses: NuGet/login@v1
        with:
          user: greepar

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path artifacts -Filter *.nupkg | Select-Object -First 1
          if ($null -eq $package) {
            throw "No NuGet package found in artifacts"
          }
          dotnet nuget push $package.FullName --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
